<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox-Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="upper">
        <div class="upper__bg">
            <img class="upper__bg--image" src="./menuback.svg" alt="upper_background">
        </div>
        <div class="upper__menu">
            <div class="upper--burger">
                <img src="./burger.svg" alt="upper_burger">
            </div>
            <div class="upper--logo">
                <img src="./Group (3).svg" alt="upper_logo">
            </div>
            <div class="upper--divider">
                <img src="./divider.svg" alt="upper_divider">
            </div>
            <div class="upper--tools">
                <img src="./repair.svg" alt="upper_tools">
            </div>
            <div class="upper--status">
                <img src="./checkstatus.svg" alt="upper_status">
            </div>


            <div class="upper--call">
                <img src="./call.svg" alt="upper_call">
            </div>
            <div class="upper--chat">
                <img src="./chat.svg" alt="upper_chat">
            </div>
            <div class="upper--profile">
                <img src="./profile.svg" alt="upper_profile">
            </div>
            <div class="upper--divider2">
                <img src="./divider_2.svg" alt="upper_divider2">
            </div>
            <!-- <div class="upper--shadow">
                <img src="./shadow.svg" alt="upper_shadow">
            </div> -->

        </div>
    </div>


    <div class="bottom">
        <div class="bg">
            <img src="./background.svg" alt="background">
        </div>
        <div class="bottom__menu">

            <div class="column--bottom">

                <div class="side">
                    <div class="bottom--title">
                        <img src="./Title Copy.svg" alt="title">
                    </div>
                    <div class="inner--slide">
                        <div class="upper--one">
                            <img src="./one.svg" alt="upper_one">
                        </div>
                        <div class="upper--two">
                            <img src="./two.svg" alt="upper_two">
                        </div>
                        <div class="upper--three">
                            <img src="./three.svg" alt="upper_three">
                        </div>
                    </div>
                </div>
                <div class="upper--slide2">
                    <img src="./slideMenu2.svg" alt="upper_slide2">
                </div>


                <div class="bottom--slide">
                    <img src="slideMenu.svg" alt="slide_Menu">
                </div>
            </div>
            
            <div class="row--bottom">

                <div class="smaller--column--bottom">
                    <div class="bottom--text">
                        <img src="text.svg" alt="text">
                    </div>
                    <div class="bottom--text2">
                        <img src="./text(2).svg" alt="bottom_text2">
                    </div>
                    <div class="text__3">
                        <div class="bottom--text3">
                            <img src="./text3.svg" alt="bottom_text3">
                        </div>


                        <div class="bottom--readmore">
                            <img src="ReadMore Copy.svg" alt="readmore">
                        </div>
                    </div>
                </div>

                <div class="bottom--picture">
                    <img src="Picture Copy.jpg" alt="picture">
                </div>

            </div>

        </div>
    </div>
</body>
</html>
